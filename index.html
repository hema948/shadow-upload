<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Shadow Upload</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .box {
      background: #1e293b;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      width: 300px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h2 {
      margin-bottom: 20px;
    }

    input[type="file"] {
      margin-bottom: 15px;
      color: white;
    }

    button {
      background: #22c55e;
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #16a34a;
    }

    #result {
      margin-top: 15px;
      word-break: break-all;
    }

    a {
      color: #38bdf8;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>🚀 Shadow Upload</h2>

  <form id="form">
    <input type="file" name="file" required />
    <br>
    <button type="submit">رفع</button>
  </form>

  <p id="result"></p>
</div>

<script>
const form = document.getElementById('form')

form.onsubmit = async (e) => {
  e.preventDefault()

  const data = new FormData(form)

  const res = await fetch('/upload', {
    method: 'POST',
    body: data
  })

  const json = await res.json()

  const result = document.getElementById('result')

  if (json.status) {
    result.innerHTML = `<a href="${json.url}" target="_blank">${json.url}</a>`
  } else {
    result.innerText = '❌ فشل الرفع'
  }
}
</script>

</body>
</html>
