<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadow Upload</title>

<style>
* {
  box-sizing: border-box;
  font-family: "Cairo", sans-serif;
}

body {
  margin: 0;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: #fff;
}

/* الحاوية */
.container {
  max-width: 480px;
  margin: auto;
  padding: 20px;
}

/* كارد */
.card {
  background: #0b1220;
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 15px;
  box-shadow: 0 0 30px rgba(0,0,0,0.4);
}

/* الهيدر */
.header {
  text-align: center;
  font-size: 22px;
  margin-bottom: 10px;
}

/* المساحة */
.usage {
  background: #0f1a30;
  padding: 12px;
  border-radius: 12px;
  font-size: 14px;
  display: flex;
  justify-content: space-between;
}

/* دراج */
.drop {
  border: 2px dashed #334155;
  border-radius: 20px;
  padding: 40px 20px;
  text-align: center;
  margin-top: 20px;
  transition: 0.3s;
}

.drop:hover {
  border-color: #38bdf8;
  background: rgba(56,189,248,0.05);
}

.icon {
  font-size: 40px;
  margin-bottom: 10px;
}

/* الأزرار */
.buttons {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}

.btn {
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  border: none;
  cursor: pointer;
  color: #fff;
  font-size: 13px;
}

.img { background: #0ea5e9; }
.vid { background: #ef4444; }
.file { background: #9333ea; }

/* زر الرفع */
.upload-btn {
  width: 100%;
  margin-top: 15px;
  padding: 15px;
  border: none;
  border-radius: 15px;
  background: linear-gradient(45deg, #1e90ff, #2563eb);
  color: white;
  font-size: 16px;
  cursor: pointer;
}

/* اللينك */
.result {
  margin-top: 15px;
  word-break: break-all;
  color: #22c55e;
}

/* API */
.api {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 14px;
}

/* Progress */
.progress {
  width: 100%;
  height: 6px;
  background: #1e293b;
  border-radius: 10px;
  margin-top: 10px;
  overflow: hidden;
}

.bar {
  height: 100%;
  width: 0%;
  background: #38bdf8;
  transition: 0.3s;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">🚀 Shadow Upload</div>

  <div class="card">
    <div class="usage">
      <span>📦 0 MB / 200 MB</span>
      <span>مساحتك المستخدمة</span>
    </div>

    <div class="drop" id="drop">
      <div class="icon">📤</div>
      اسحب الملف هنا أو اضغط للاختيار
      <input type="file" id="file" hidden>
    </div>

    <div class="buttons">
      <button class="btn img">صور 📷</button>
      <button class="btn vid">فيديو 🎬</button>
      <button class="btn file">ملفات 📄</button>
    </div>

    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>

    <button class="upload-btn" onclick="upload()">اختار ملف أولاً</button>

    <div class="result" id="result"></div>
  </div>

  <div class="card api">
    <span>API للمطورين</span>
    <span>⚡</span>
  </div>

</div>

<script>
const fileInput = document.getElementById('file')
const drop = document.getElementById('drop')
const bar = document.getElementById('bar')

drop.onclick = () => fileInput.click()

drop.ondragover = e => {
  e.preventDefault()
  drop.style.borderColor = '#38bdf8'
}

drop.ondragleave = () => {
  drop.style.borderColor = '#334155'
}

drop.ondrop = e => {
  e.preventDefault()
  fileInput.files = e.dataTransfer.files
  drop.style.borderColor = '#334155'
}

async function upload() {
  let file = fileInput.files[0]

  if (!file) {
    alert("اختار ملف الأول")
    return
  }

  let form = new FormData()
  form.append("file", file)

  let xhr = new XMLHttpRequest()

  xhr.upload.onprogress = (e) => {
    let percent = (e.loaded / e.total) * 100
    bar.style.width = percent + "%"
  }

  xhr.onload = () => {
    let data = JSON.parse(xhr.responseText)

    if (data.status) {
      document.getElementById('result').innerHTML =
        `🔗 <a href="${data.url}" target="_blank">${data.url}</a>`
    } else {
      document.getElementById('result').innerText = "❌ فشل الرفع"
    }
  }

  xhr.open("POST", "/upload")
  xhr.send(form)
}
</script>

</body>
</html>
