<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Shadow Upload</title>
<style>
body {
  background:#0b1220;
  color:#fff;
  font-family:Arial;
  text-align:center;
}

.box {
  margin:50px auto;
  padding:30px;
  border:2px dashed #555;
  width:300px;
  border-radius:15px;
}

button {
  padding:10px 20px;
  background:#3b82f6;
  border:none;
  border-radius:10px;
  color:#fff;
  cursor:pointer;
}

a {
  display:block;
  margin-top:15px;
  color:#00ffcc;
}
</style>
</head>
<body>

<h2>📤 Shadow Upload</h2>

<div class="box">
  <input type="file" id="file"><br><br>
  <button onclick="upload()">رفع</button>
  <a id="link"></a>
</div>

<script>
async function upload() {
  const file = document.getElementById('file').files[0]
  if (!file) return alert('اختار ملف')

  const form = new FormData()
  form.append('file', file)

  const res = await fetch('/upload', {
    method: 'POST',
    body: form
  })

  const data = await res.json()

  if (data.status) {
    document.getElementById('link').innerText = data.url
    document.getElementById('link').href = data.url
  } else {
    alert('فشل')
  }
}
</script>

</body>
</html>
